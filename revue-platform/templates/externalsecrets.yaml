{{/*
Materialise the N27a/revue bundle into namespace Secrets via ESO. One ASM bundle
(asmKeys.bundle), dataFrom.extract'd and remapped per Secret:

  • revue-rails   — app env (SECRET_KEY_BASE, AR encryption keys, Turnstile,
                    Stripe, Resend). Mounted on web/worker via extraEnvVarsSecret.
  • revue-db      — basic-auth for the OWNER role `revue` (migrations + the CNPG
                    bootstrap passwordSecret). sync-wave -10 (before the Cluster).
  • revue-app-db  — basic-auth for the NON-OWNER runtime role `revue_app` (web /
                    worker DATABASE_URL + the CNPG managed-role passwordSecret).
  • revue-s3      — IAM keys from the separate service_user bundle (env-scoped).
*/}}
{{- $bundle := .Values.externalSecrets.asmKeys.bundle -}}
{{- if $bundle }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "revue.resourceName" (dict "ctx" . "suffix" "rails") }}
  namespace: {{ include "revue.namespace" . }}
  labels: {{- include "revue.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ $bundle }}
  target:
    name: {{ include "revue.resourceName" (dict "ctx" . "suffix" "rails") }}
    creationPolicy: Owner
    template:
      data:
        SECRET_KEY_BASE: "{{ `{{ .secret_key_base }}` }}"
        ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: "{{ `{{ .active_record_encryption_primary_key }}` }}"
        ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: "{{ `{{ .active_record_encryption_deterministic_key }}` }}"
        ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: "{{ `{{ .active_record_encryption_key_derivation_salt }}` }}"
        TURNSTILE_SECRET: "{{ `{{ .turnstile_secret }}` }}"
        TURNSTILE_SITE_KEY: "{{ `{{ .turnstile_site_key }}` }}"
        STRIPE_SECRET_KEY: "{{ `{{ .stripe_secret_key }}` }}"
        STRIPE_WEBHOOK_SECRET: "{{ `{{ .stripe_webhook_secret }}` }}"
        RESEND_API_KEY: "{{ `{{ .resend_api_key }}` }}"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.cnpg.ownerPasswordSecret }}
  namespace: {{ include "revue.namespace" . }}
  labels: {{- include "revue.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ $bundle }}
  target:
    name: {{ .Values.cnpg.ownerPasswordSecret }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: {{ .Values.cnpg.owner }}
        password: "{{ `{{ .db_password }}` }}"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.cnpg.appRolePasswordSecret }}
  namespace: {{ include "revue.namespace" . }}
  labels: {{- include "revue.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ $bundle }}
  target:
    name: {{ .Values.cnpg.appRolePasswordSecret }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: {{ .Values.cnpg.appRole }}
        password: "{{ `{{ .app_db_password }}` }}"
{{- end }}

{{- if .Values.externalSecrets.asmKeys.s3 }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "revue.resourceName" (dict "ctx" . "suffix" "s3") }}
  namespace: {{ include "revue.namespace" . }}
  labels: {{- include "revue.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  target:
    name: {{ include "revue.resourceName" (dict "ctx" . "suffix" "s3") }}
    creationPolicy: Owner
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.externalSecrets.asmKeys.s3 }}
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.asmKeys.s3 }}
        property: AWS_SECRET_ACCESS_KEY
{{- end }}
