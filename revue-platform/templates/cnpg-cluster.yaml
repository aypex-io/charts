apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.cnpg.name }}
  namespace: {{ include "revue.namespace" . }}
  labels: {{- include "revue.labels" . | nindent 4 }}
spec:
  instances: {{ .Values.cnpg.instances }}
  imageName: {{ .Values.cnpg.imageName }}
  primaryUpdateStrategy: unsupervised
  enableSuperuserAccess: false
  minSyncReplicas: 0
  maxSyncReplicas: {{ .Values.cnpg.maxSyncReplicas }}
  # Per-instance CNPG metrics (:9187 /metrics) scraped by obs/Alloy via the
  # prometheus.io pod annotations (no PodMonitor CRD on this cluster).
  inheritedMetadata:
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9187"

  {{- with .Values.cnpg.parameters }}
  postgresql:
    parameters: {{- toYaml . | nindent 6 }}
  {{- end }}

  bootstrap:
    initdb:
      database: {{ .Values.cnpg.database }}
      owner: {{ .Values.cnpg.owner }}
      secret:
        name: {{ .Values.cnpg.ownerPasswordSecret }}

  # The runtime role: a NON-OWNER login the web/worker pods connect as, so RLS
  # engages (a table's owner bypasses RLS). CNPG keeps its password in sync with
  # the ESO-fed secret. DML grants are applied by the migrate Job
  # (db/migrate/*_grant_runtime_app_role), which runs as the owner.
  managed:
    roles:
    - name: {{ .Values.cnpg.appRole }}
      ensure: present
      login: true
      passwordSecret:
        name: {{ .Values.cnpg.appRolePasswordSecret }}

  storage:
    size: {{ .Values.cnpg.storageSize }}
    storageClass: {{ .Values.cnpg.storageClass }}

  walStorage:
    size: {{ .Values.cnpg.walStorageSize }}
    storageClass: {{ .Values.cnpg.walStorageClass | default .Values.cnpg.storageClass }}

  {{- if .Values.cnpg.objectStore.enabled }}
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: aws-s3
  {{- end }}

  resources: {{- toYaml .Values.cnpg.resources | nindent 4 }}

  {{- with .Values.cnpg.affinity }}
  affinity: {{- toYaml . | nindent 4 }}
  {{- end }}
