## revue-platform umbrella — product-neutral defaults.
## Env overlays live in gitops-aypex products/revue/{base,stg,prd}/values.yaml.

## @section Top-level
env: ""                  # "stg" | "prd" — env overlay
namespace: ""            # auto: "revue-{env}" — see _helpers.tpl
name: revue              # resource-name prefix (this is a single product)
clusterDomain: cluster.local

## @section Hostnames + gateway wiring
## The Rails app serves BOTH the admin UI (admin host) and the public widget +
## integration API (api host). The widget JS bundle itself is served from
## cdn.revue.aypex.io (S3 + Cloudflare), NOT through this cluster.
hostnames:
  admin: ""              # admin.revue.fyi
  api: ""                # api.revue.fyi
  public: ""             # wildcard for per-store public sites, e.g. "*.revue.fyi".
                         # PRD only (stg can't co-own *.revue.fyi). Empty = no route.

gateway:
  name: main
  namespace: gateway
  sectionNames:
    reviews: []          # fallback listener for all routes
    admin: []            # per-route listener (falls back to .reviews)
    api: []              # per-route listener (falls back to .reviews)
    public: []           # per-route listener (falls back to .reviews)

## @section CNPG cluster
## Single database `revue`, owner role `revue` (DDL / migrations), plus a
## NON-OWNER managed role `revue_app` that the web/worker pods connect as so
## Postgres RLS engages as the multi-tenant backstop. The pooler is DISABLED:
## the app sets the per-request `revue.account_id` GUC at session level, which
## a transaction-pooling PgBouncer would not preserve.
cnpg:
  name: revue-db
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  storageSize: 20Gi
  walStorageSize: 5Gi
  storageClass: ceph-block-r1
  walStorageClass: ""
  maxSyncReplicas: 0
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  parameters: {}
  affinity: {}
  scheduledBackup:
    enabled: false
    schedule: "0 0 * * * *"
    immediate: false
  objectStore:
    enabled: false
    bucket: ""
    path: ""
    retentionPolicy: "30d"
    retentionPolicyIntervalSeconds: 1800
    walCompression: gzip
  # The owner role (migrations) is the bootstrap db owner; the runtime role is
  # an extra managed login. Both passwords come from the ASM bundle via ESO.
  database: revue
  owner: revue
  ownerPasswordSecret: revue-db
  appRole: revue_app
  appRolePasswordSecret: revue-app-db

## @section Dragonfly engine image (shared by the redis-cache instance)
## NB: pgbus moved BOTH background jobs and realtime streams onto Postgres/PGMQ,
## so the persistent queue (redisQueue) and ActionCable pub/sub (redisCable)
## Dragonfly instances are gone. Only the cache instance remains.
dragonfly:
  image:
    registry: docker.dragonflydb.io
    repository: dragonflydb/dragonfly
    tag: v1.39.0

## @section Redis cache Dragonfly (Rails.cache + rack-attack; REDIS_CACHE_URL=…/1, LRU eviction)
redisCache:
  enabled: true
  replicaCount: 1
  proactorThreads: 2
  maxmemory: 576mb
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      memory: 768Mi

## @section ExternalSecrets — ONE consolidated bundle N27a/revue (ESO splits it)
externalSecrets:
  storeName: cluster-secret-store
  storeKind: ClusterSecretStore
  refreshInterval: 1h
  asmKeys:
    bundle: ""           # N27a/revue (base overlay)
    s3: ""               # service_user/<acct>/revue-<env> (env overlay) — IAM keys
    cnpgBackup: ""       # service_user/<acct>/cnpg (prd overlay)

## @section S3 — review media bucket (env overlay supplies). Under `global` so
## it reaches the rails-server subchart's extraEnvVars (AWS_BUCKET).
global:
  s3:
    mediaBucket: ""

## @section Image tag (env overlay supplies; kept in lockstep with web/worker).
images:
  backend: ""

## @section Subchart defaults
_railsSecurity: &railsSecurity
  podSecurityContext:
    enabled: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: Always
  containerSecurityContext:
    enabled: true
    runAsUser: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault

web:
  <<: *railsSecurity
  command: [bundle, exec, rails, server, "-b", "0.0.0.0", "-p", "3000"]
  service:
    enabled: true
    ports:
      http: 80
  containerPorts:
    http: 3000
  resourcesPreset: none
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  terminationGracePeriodSeconds: 40
  lifecycleHooks:
    preStop:
      exec:
        command: ["sh", "-c", "sleep 10"]

worker:
  <<: *railsSecurity
  # pgbus supervisor — workers + dispatcher + recurring scheduler, all on
  # Postgres/PGMQ (no Sidekiq, no Redis).
  command: [bundle, exec, pgbus, start]
  service:
    enabled: false
  # No external liveness/readiness probe. The pgbus supervisor reaps stalled
  # workers and recycles them itself (max_jobs_per_worker / max_memory_mb), and a
  # crashed supervisor process exits → k8s restarts the pod regardless. (The old
  # Sidekiq probe relied on a per-beat /tmp/sidekiq_alive touch pgbus doesn't
  # emit; a heartbeat-freshness exec probe over pgbus_processes could be added if
  # a wedged-but-running supervisor — distinct from a wedged worker — ever proves
  # a real risk.)
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  resourcesPreset: none

migrate:
  <<: *railsSecurity
  # db:prepare (schema) → db:install_pgmq (vendored PGMQ schema; schema.rb can't
  # carry it) → db:enforce_tenancy (RLS, resolver fns, runtime-role + pgmq
  # grants). Shell form so the three run in order, all as the owner role.
  command: [sh, -c, "bundle exec rails db:prepare && bundle exec rails db:install_pgmq && bundle exec rails db:enforce_tenancy"]
  hook: post-install,post-upgrade
  hookWeight: "-5"
  hookDeletePolicy: before-hook-creation
  backoffLimit: 3
  resourcesPreset: none

seed:
  <<: *railsSecurity
  command: [bundle, exec, rails, db:seed]
  hook: post-install,post-upgrade
  hookWeight: "0"
  hookDeletePolicy: before-hook-creation
  backoffLimit: 1
  resourcesPreset: none
