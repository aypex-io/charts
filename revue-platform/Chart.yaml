apiVersion: v2
name: revue-platform
description: Revue headless reviews platform umbrella — Rails 8 API + Hotwire admin (web) + Sidekiq (worker) on a single CNPG cluster + dedicated Dragonfly instances (redis-queue / redis-cache / redis-cable). Single product (not per-customer fan-out); stg + prd envs, consumed by gitops products/revue overlays.
type: application
version: 0.1.2
appVersion: "1.0.0"
dependencies:
  - name: common
    version: 2.40.0
    repository: oci://registry-1.docker.io/bitnamicharts
  - name: rails-server
    version: 0.2.0
    alias: web
    repository: oci://ghcr.io/aypex-io/charts
  - name: rails-server
    version: 0.2.0
    alias: worker
    repository: oci://ghcr.io/aypex-io/charts
  - name: rails-task
    version: 0.1.0
    alias: migrate
    repository: oci://ghcr.io/aypex-io/charts
  - name: rails-task
    version: 0.1.0
    alias: seed
    repository: oci://ghcr.io/aypex-io/charts
