## spree-store umbrella — tenant-neutral defaults.
## Per-tenant overlays live in customers/<slug>/base/values.yaml.
## Per-env overlays live in customers/<slug>/{stg,prd}/values.yaml.

## @section Top-level
## env + customer.slug come from the per-tenant overlays; namespace is derived.
env: ""                  # "stg" | "prd" — env overlay
namespace: ""            # auto: "{customer.slug}-{env}" — see _helpers.tpl

customer:
  slug: ""               # tenant base overlay

clusterDomain: cluster.local

## @section Hostnames + gateway wiring
## All four hostnames come from the per-env overlay.
## `storefront` may be a single host (string) or a list of hosts for a
## multi-domain store (one market per domain), e.g.
##   storefront:
##     - example.com
##     - example.us
##     - example.uk
##     - example.eu
hostnames:
  admin: ""
  api: ""
  storefront: ""
  cms: ""

publicURL:
  admin: ""
  api: ""
  storefront: ""
  cms: ""

gateway:
  name: main
  namespace: envoy-gateway-system
  sectionNames:
    fitness: []          # fallback for admin + api when .admin/.api unset
    com: []              # cms route (+ storefront fallback if .storefront unset)
    # admin / api: per-route listeners. When the admin host is on the apex and
    # the api host on a subdomain (or vice versa) they need DIFFERENT listeners
    # — set each so its single hostname intersects exactly one listener (else a
    # parentRef reports NoMatchingListenerHostname). Both fall back to .fitness.
    #   admin: [example-fitness-https]            # apex listener
    #   api:   [wildcard-example-fitness-https]   # wildcard listener
    admin: []
    api: []
    # storefront: listeners the storefront domains attach to. When unset the
    # storefront route falls back to `.com`. For a multi-domain store, list
    # every base-domain listener, e.g. (prod apex listeners):
    #   storefront:
    #     - example-com-https
    #     - example-us-https
    #     - example-uk-https
    #     - example-eu-https
    storefront: []

## @section CNPG cluster (shared by spree + payload)
cnpg:
  name: ""               # tenant base overlay — typically "<slug>-db"
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18
  storageSize: 20Gi
  walStorageSize: 5Gi
  storageClass: ceph-block-r1
  walStorageClass: ""
  maxSyncReplicas: 0

  # CNPG pod resources. Default sized for throwaway envs (stg); prd overlays
  # bump to production sizing to match the legacy tkf pg-primary cluster.
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi

  # postgresql.parameters passed through to the Cluster CR. Empty by default
  # (CNPG defaults apply); prd overlays set production tuning.
  parameters: {}

  # CNPG spec.affinity (AffinityConfiguration). Empty by default → CNPG's
  # built-in soft (preferred) pod anti-affinity applies, fine for throwaway
  # stg. prd overlays set required hostname anti-affinity for one-pod-per-node.
  affinity: {}

  pooler:
    enabled: true
    instances: 1
    maxClientConn: "200"
    defaultPoolSize: "10"

  scheduledBackup:
    enabled: false
    schedule: "0 0 * * * *"
    # Take a base backup as soon as the ScheduledBackup is created (one-shot
    # on create, then on schedule). prd sets true so the cluster is
    # restorable immediately rather than waiting for the first cron tick.
    immediate: false

  objectStore:
    enabled: false
    bucket: ""
    path: ""
    retentionPolicy: "30d"
    retentionPolicyIntervalSeconds: 1800
    walCompression: gzip

  ## Initial databases + owners. Each gets a Database CR (CNPG ≥1.24) so we
  ## don't depend on postInitSQL (which doesn't run during recovery-from-backup).
  databases: []          # tenant base overlay — see customers/tkf/base/values.yaml

## @section Dragonfly engine image (shared by all redis-* instances below)
## Every redis-{queue,cache,cable} instance runs the same Dragonfly build; the
## image lives here once and the three instance blocks reference it.
dragonfly:
  image:
    # docker.dragonflydb.io IS the registry; previous values doubled it up
    # under docker.io which resolved to a non-existent docker.io image.
    registry: docker.dragonflydb.io
    repository: dragonflydb/dragonfly
    tag: latest

## @section Redis queue Dragonfly (Sidekiq job queues)
## Persistent store for Sidekiq queues (REDIS_URL=…/0 on web + worker). Runs
## WITHOUT eviction (Dragonfly OOMs when full) because losing a queued/in-flight
## job is data loss. Do NOT point eviction-tolerant cache load here — that's
## `redisCache`. ActionCable moved off this to `redisCable` in 0.5.0.
## (Renamed from `dragonfly` in 0.5.0; resource name `{release}-redis-queue`.)
redisQueue:
  enabled: true
  replicaCount: 1
  proactorThreads: 2
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

## @section Redis cable Dragonfly (ActionCable pub/sub)
## Dedicated instance for ActionCable pub/sub (CABLE_REDIS_URL=…/0). Pub/sub is
## transient (no stored keys), so it stays tiny and runs without eviction or
## persistence. Requires a backend image whose config/cable.yml reads
## CABLE_REDIS_URL (falls back to REDIS_URL on older images). New in 0.5.0.
redisCable:
  enabled: true
  replicaCount: 1
  proactorThreads: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi

## @section Redis cache Dragonfly (shared LRU cache backend)
## A DEDICATED eviction-tolerant Redis-compatible instance shared by:
##   * the Next.js storefront cache handlers (ISR + Cache Components) — db 0
##   * the Rails backend `Rails.cache` (REDIS_CACHE_URL) — db 1
## Kept separate from the redisQueue instance above so page + fragment cache
## can never evict or OOM job state. Runs with `--cache_mode=true` + `--maxmemory`
## so under pressure it evicts least-recently-used entries (all carry TTLs)
## instead of failing — exactly what a cache wants. Ephemeral; cold-start
## repopulates, so no persistence.
## (Renamed from `storefrontCache` in 0.4.0 — now serves the backend too.)
redisCache:
  enabled: true
  replicaCount: 1
  # Two proactor threads now that both the storefront and Rails share it.
  proactorThreads: 2
  # Image reused from .Values.dragonfly.image (same Dragonfly build).
  # Eviction ceiling — held at ~75% of the container memory limit so Dragonfly's
  # own per-shard bookkeeping has headroom before the cgroup OOM-kills it.
  maxmemory: 576mb
  resources:
    requests:
      cpu: 100m
      memory: 384Mi
    limits:
      memory: 768Mi

## @section ExternalSecrets
externalSecrets:
  storeName: cluster-secret-store
  storeKind: ClusterSecretStore
  refreshInterval: 1h

  ## ASM keys — base overlay supplies env-neutral keys (e.g. shared rails
  ## master key); env overlays supply env-scoped keys (S3 creds per env).
  asmKeys:
    spreeRails: ""
    spreeS3: ""
    spreeSmtp: ""
    cmsPayload: ""
    cmsS3: ""
    cnpgBackup: ""
    # Shared storefront<->CMS on-publish revalidation token (single
    # REVALIDATE_SECRET property). Materialised into the `<slug>-revalidate`
    # Secret, consumed by both pods via extraEnvVarsSecret.
    revalidate: ""

## @section S3 buckets — env overlay supplies.
## Under `global` so they propagate to the rails-server / nextjs subcharts,
## where the tenant-base extraEnvVars reference them via `tpl`
## (AWS_BUCKET for Spree Active Storage, S3_BUCKET for Payload).
global:
  s3:
    spreeBucket: ""        # env overlay: tkf-spree-<env>-storage-...
    cmsBucket: ""          # env overlay: tkf-payload-<env>-media-...

## @section Image tags for the cms-migrate hook Job + hash-naming. Empty
## defaults so the bare chart renders/lints; the gitops env overlay supplies
## the real tags (kept in lockstep with web/cms.image.tag).
images:
  spree: ""
  storefront: ""
  cms: ""

## @section CMS migrate Job (Payload). Lives in the umbrella because the
## cms image is the nextjs subchart's payload-shaped consumer; rails-task
## is Rails-specific.
jobs:
  cmsMigrate:
    enabled: true
    backoffLimit: 3

## @section Subchart defaults — generic Rails / Next defaults that work
## across tenants. Tenant base overlay supplies image registry + repository;
## env overlay supplies the tag and replica count.
##
## Aliases:
##   web, worker         -> rails-server (Deployments)
##   migrate, seed, rake -> rails-task   (Jobs, helm post-install hooks)
##   storefront, cms     -> nextjs       (Deployments)

_railsSecurity: &railsSecurity
  podSecurityContext:
    enabled: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: Always
  containerSecurityContext:
    enabled: true
    runAsUser: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault

_nextSecurity: &nextSecurity
  podSecurityContext:
    enabled: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  containerSecurityContext:
    enabled: true
    runAsUser: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault

web:
  <<: *railsSecurity
  command: [bundle, exec, rails, server, "-b", "0.0.0.0", "-p", "3000"]
  service:
    enabled: true
    ports:
      http: 80
  containerPorts:
    http: 3000
  resourcesPreset: none
  # Graceful rollout (lever B): a preStop drain lets the gateway deregister this
  # endpoint before SIGTERM, so an umbrella roll doesn't sever in-flight storefront
  # SSR fetches mid-request (the "Connection closed" hangs). Never drop below
  # desired replicas during the roll.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  terminationGracePeriodSeconds: 40
  lifecycleHooks:
    preStop:
      exec:
        command: ["sh", "-c", "sleep 10"]

worker:
  <<: *railsSecurity
  command: [bundle, exec, sidekiq]
  service:
    enabled: false
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  resourcesPreset: none

migrate:
  <<: *railsSecurity
  command: [bundle, exec, rails, db:prepare]
  hook: post-install,post-upgrade
  hookWeight: "-5"
  hookDeletePolicy: before-hook-creation
  backoffLimit: 3
  resourcesPreset: none

seed:
  <<: *railsSecurity
  command: [bundle, exec, rails, db:seed]
  hook: post-install
  hookWeight: "0"
  hookDeletePolicy: before-hook-creation
  backoffLimit: 1
  resourcesPreset: none

rake:
  <<: *railsSecurity
  command: [bundle, exec, rake, --version]  # tenant overrides per env
  hook: post-install,post-upgrade
  hookWeight: "5"
  hookDeletePolicy: before-hook-creation
  backoffLimit: 1
  resourcesPreset: none

storefront:
  <<: *nextSecurity
  service:
    enabled: true
    ports:
      http: 80
  containerPorts:
    http: 3001
  resourcesPreset: none
  # The storefront runs Next.js standalone with cacheComponents on a read-only
  # root. Seed a writable .next/server so ISR / Cache Components can persist
  # their render cache instead of failing with EROFS on every revalidation.
  writableNextServer:
    enabled: true
  # Graceful rollout (lever B): drain before SIGTERM so a roll doesn't drop the
  # in-flight HTML document, and never drop below desired replicas.
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  terminationGracePeriodSeconds: 40
  lifecycleHooks:
    preStop:
      exec:
        command: ["sh", "-c", "sleep 10"]

cms:
  <<: *nextSecurity
  service:
    enabled: true
    ports:
      http: 80
  containerPorts:
    http: 3000
  resourcesPreset: none
