apiVersion: v2
name: spree-platform
description: Aypex Spree commerce platform umbrella — Spree backend (rails) + Next.js storefront + Payload CMS (nextjs) on a single CNPG cluster + dedicated Dragonfly instances (redis-queue / redis-cache / redis-cable) per env. Multi-tenant; consumed by gitops with per-customer overlays.
