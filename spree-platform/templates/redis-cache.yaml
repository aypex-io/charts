{{- if .Values.redisCache.enabled }}
{{- /*
Shared eviction-tolerant Dragonfly cache, used by BOTH the Next.js storefront
(cache handlers — ISR routes + Cache Components segments, logical db 0) AND the
Rails backend (Rails.cache via REDIS_CACHE_URL, logical db 1). Kept separate
from the Sidekiq `{{ .Release.Name }}-redis-queue` so eviction-tolerant page
+ fragment cache can never OOM or evict job state. Runs in cache mode (LRU
eviction at --maxmemory). Ephemeral; cold-start repopulates, so no persistence.
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-redis-cache
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis-cache
spec:
  replicas: {{ .Values.redisCache.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: redis-cache
  template:
    metadata:
      # Dragonfly serves Prometheus metrics over HTTP on its main port
      # (6379 /metrics). No PodMonitor CRD here — obs/Alloy discovers targets by
      # prometheus.io pod annotations. Surfaces this instance in the obs
      # "Dragonfly — Redis / Cache" dashboard (hit ratio, memory, evictions).
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6379"
        prometheus.io/path: /metrics
      labels: {{- include "spree-store.labels" . | nindent 8 }}
        app.kubernetes.io/component: redis-cache
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dragonfly
          image: {{ .Values.dragonfly.image.registry }}/{{ .Values.dragonfly.image.repository }}:{{ .Values.dragonfly.image.tag }}
          args:
            - --logtostderr
            - --proactor_threads={{ .Values.redisCache.proactorThreads }}
            # Evict LRU under pressure instead of OOMing (page + fragment cache,
            # not job state). All entries carry TTLs.
            - --cache_mode=true
            # Hard eviction ceiling — keep comfortably under the container memory
            # limit so Dragonfly's own bookkeeping never trips the cgroup OOM.
            - --maxmemory={{ .Values.redisCache.maxmemory }}
            # Skip the startup phone-home version check (locked-down cluster, no
            # egress; avoids a slow boot probe + log noise).
            - --version_check=false
          ports:
            - containerPort: 6379
              name: dragonfly
          readinessProbe:
            tcpSocket:
              port: dragonfly
            initialDelaySeconds: 5
          livenessProbe:
            tcpSocket:
              port: dragonfly
            initialDelaySeconds: 15
          resources: {{- toYaml .Values.redisCache.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis-cache
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: redis-cache
  ports:
    - name: dragonfly
      port: 6379
      targetPort: dragonfly
{{- end }}
