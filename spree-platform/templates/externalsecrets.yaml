{{/*
Materialise tenant ASM bundles into namespace Secrets.

Two ASM bundle patterns:

  • Tenant bundles (N27a/<app>/<slug>) — env-neutral, hold all env-suffixed
    keys (rails_master_key, secret_key_base_<env>, payload_secret_<env>,
    db_password_<env>). We `dataFrom.extract` the whole bundle and use
    target.template to pull just the values we want and remap the key
    names to what the workloads expect.

  • Per-env service-user bundles (service_user/prod/<slug>-{spree,payload}-<env>,
    service_user/prod/cnpg) — already env-scoped, hold IAM access keys. Direct
    property mapping with no renaming.

The CNPG Cluster expects passwordSecret-referenced Secrets to exist before
bootstrap; tkf-spree-db / tkf-cms-db (kubernetes.io/basic-auth) below feed
those refs.
*/}}

{{- /* ---- N27a/spree/<slug> ---- */ -}}
{{- if .Values.externalSecrets.asmKeys.spreeRails }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-rails") }}
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ .Values.externalSecrets.asmKeys.spreeRails }}
  target:
    name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-rails") }}
    creationPolicy: Owner
    template:
      data:
        SECRET_KEY_BASE: "{{ printf "{{ .secret_key_base_%s }}" .Values.env }}"
        RAILS_MASTER_KEY: "{{ `{{ .rails_master_key }}` }}"
---
{{/* CNPG passwordSecret target for spree role. */}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-db") }}
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ .Values.externalSecrets.asmKeys.spreeRails }}
  target:
    name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-db") }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: spree
        password: "{{ printf "{{ .db_password_%s }}" .Values.env }}"
---
{{- end }}

{{- /* ---- N27a/cms/<slug> ---- */ -}}
{{- if .Values.externalSecrets.asmKeys.cmsPayload }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "cms-payload") }}
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ .Values.externalSecrets.asmKeys.cmsPayload }}
  target:
    name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "cms-payload") }}
    creationPolicy: Owner
    template:
      data:
        PAYLOAD_SECRET: "{{ printf "{{ .payload_secret_%s }}" .Values.env }}"
---
{{/* CNPG passwordSecret target for payload role. */}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "cms-db") }}
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ .Values.externalSecrets.asmKeys.cmsPayload }}
  target:
    name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "cms-db") }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: payload
        password: "{{ printf "{{ .db_password_%s }}" .Values.env }}"
---
{{- end }}

{{- /* ---- service_user/prod/<slug>-spree-<env> ---- */ -}}
{{- if .Values.externalSecrets.asmKeys.spreeS3 }}
{{ include "spree-store.externalSecret" (dict
  "name" (include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-s3"))
  "asmKey" .Values.externalSecrets.asmKeys.spreeS3
  "data" (list "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY")
  "context" $) }}
---
{{- end }}

{{- /* ---- N27a/smtp/<slug> — Postmark token → SMTP user+pass ---- */ -}}
{{- if .Values.externalSecrets.asmKeys.spreeSmtp }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-smtp") }}
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ .Values.externalSecrets.asmKeys.spreeSmtp }}
  target:
    name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-smtp") }}
    creationPolicy: Owner
    template:
      data:
        # Postmark uses the server token as BOTH SMTP username and password.
        SMTP_USERNAME: "{{ `{{ .smtp_token }}` }}"
        SMTP_PASSWORD: "{{ `{{ .smtp_token }}` }}"
---
{{- end }}

{{- /* ---- service_user/prod/<slug>-payload-<env> ---- */ -}}
{{- if .Values.externalSecrets.asmKeys.cmsS3 }}
{{ include "spree-store.externalSecret" (dict
  "name" (include "spree-store.resourceName" (dict "ctx" . "suffix" "cms-s3"))
  "asmKey" .Values.externalSecrets.asmKeys.cmsS3
  "data" (list "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY")
  "context" $) }}
---
{{- end }}

{{- /* ---- service_user/prod/cnpg ---- */ -}}
{{- if and .Values.cnpg.objectStore.enabled .Values.externalSecrets.asmKeys.cnpgBackup }}
{{ include "spree-store.externalSecret" (dict
  "name" (include "spree-store.resourceName" (dict "ctx" . "suffix" "cnpg-backup"))
  "asmKey" .Values.externalSecrets.asmKeys.cnpgBackup
  "data" (list "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY")
  "context" $) }}
{{- end }}

{{- /* ---- N27a/revalidate/<slug> — shared storefront<->CMS on-publish token ---- */ -}}
{{- /* Single REVALIDATE_SECRET → `<slug>-revalidate` Secret; both pods pull it */ -}}
{{- /* via extraEnvVarsSecret. Lets the Payload hooks purge storefront cache    */ -}}
{{- /* tags on publish instead of waiting out the 60s ISR window.              */ -}}
{{- if .Values.externalSecrets.asmKeys.revalidate }}
---
{{ include "spree-store.externalSecret" (dict
  "name" (include "spree-store.resourceName" (dict "ctx" . "suffix" "revalidate"))
  "asmKey" .Values.externalSecrets.asmKeys.revalidate
  "data" (list "REVALIDATE_SECRET")
  "context" $) }}
{{- end }}
