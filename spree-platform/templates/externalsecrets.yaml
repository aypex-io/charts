{{/*
Materialise the tenant's secret material into namespace Secrets.

Two ASM source patterns:

  • ONE consolidated tenant bundle — N27a/<namespace> (asmKeys.bundle). Holds all
    of the tenant's app secret material under flat, env-neutral keys (one AWS
    account per env post the Staging-account split, so no env suffixes). Every
    app ExternalSecret below `dataFrom.extract`s this single bundle and uses
    target.template to pick the keys it needs and remap them to the names the
    workloads expect. This is the <cluster>/<namespace> convention — see
    infra/ASM-CONSOLIDATION-PLAN.md.

  • Per-env service-user bundles (service_user/<acct>/<slug>-{spree,payload}-<env>,
    service_user/<acct>/cnpg) — already env-scoped, hold IAM access keys. Direct
    property mapping with no renaming (spree-store.externalSecret helper).

The CNPG Cluster expects passwordSecret-referenced Secrets to exist before
bootstrap; tkf-spree-db / tkf-cms-db (kubernetes.io/basic-auth) below feed those
refs (sync-wave -10).
*/}}

{{- $bundle := .Values.externalSecrets.asmKeys.bundle -}}
{{- if $bundle }}
{{- /* ---- Spree Rails secrets (from N27a/<namespace>) ---- */ -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-rails") }}
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ $bundle }}
  target:
    name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-rails") }}
    creationPolicy: Owner
    template:
      data:
        SECRET_KEY_BASE: "{{ `{{ .secret_key_base }}` }}"
        {{- /* Dedicated signing key for Spree Store API customer JWTs. Without */}}
        {{- /* it Spree falls back to SECRET_KEY_BASE (see tg_customer_tkf).    */}}
        JWT_SECRET_KEY: "{{ `{{ .jwt_secret_key }}` }}"
        {{- /* Super-admin creds for the db:seed Job's CREATE-ONLY admin step    */}}
        {{- /* (db/seeds/tkf/super_admin.rb).                                    */}}
        ADMIN_EMAIL: "{{ `{{ .super_admin_email }}` }}"
        ADMIN_PASSWORD: "{{ `{{ .super_admin_password }}` }}"
        {{- if .Values.meilisearch.enabled }}
        {{- /* Meilisearch master key — shared by the Spree backend (reads it as */}}
        {{- /* MEILISEARCH_API_KEY, see Spree::SearchProvider::Meilisearch) AND   */}}
        {{- /* the meilisearch Deployment (MEILI_MASTER_KEY via secretKeyRef on   */}}
        {{- /* this same Secret).                                                 */}}
        MEILISEARCH_API_KEY: "{{ `{{ .meili_master_key }}` }}"
        {{- end }}
---
{{/* CNPG passwordSecret target for the spree role. */}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-db") }}
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ $bundle }}
  target:
    name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-db") }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: spree
        password: "{{ `{{ .spree_db_password }}` }}"
---
{{- /* ---- Payload CMS secrets (from N27a/<namespace>) ---- */ -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "cms-payload") }}
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ $bundle }}
  target:
    name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "cms-payload") }}
    creationPolicy: Owner
    template:
      data:
        PAYLOAD_SECRET: "{{ `{{ .payload_secret }}` }}"
---
{{/* CNPG passwordSecret target for the payload role. */}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "cms-db") }}
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ $bundle }}
  target:
    name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "cms-db") }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      data:
        username: payload
        password: "{{ `{{ .cms_db_password }}` }}"
---
{{- /* ---- Postmark SMTP token → SMTP user+pass (from N27a/<namespace>) ---- */ -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-smtp") }}
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ $bundle }}
  target:
    name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-smtp") }}
    creationPolicy: Owner
    template:
      data:
        # Postmark uses the server token as BOTH SMTP username and password.
        SMTP_USERNAME: "{{ `{{ .smtp_token }}` }}"
        SMTP_PASSWORD: "{{ `{{ .smtp_token }}` }}"
---
{{- /* ---- Shared storefront<->CMS on-publish revalidation token ---- */ -}}
{{- /* Single REVALIDATE_SECRET → `<slug>-revalidate`; both pods pull it via    */ -}}
{{- /* extraEnvVarsSecret. Lets the Payload hooks purge storefront cache tags   */ -}}
{{- /* on publish instead of waiting out the 60s ISR window.                    */ -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "revalidate") }}
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ $bundle }}
  target:
    name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "revalidate") }}
    creationPolicy: Owner
    template:
      data:
        REVALIDATE_SECRET: "{{ `{{ .revalidate_secret }}` }}"
---
{{- /* ---- Resend API key for storefront transactional email ---- */ -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "resend") }}
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ $bundle }}
  target:
    name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "resend") }}
    creationPolicy: Owner
    template:
      data:
        RESEND_API_KEY: "{{ `{{ .resend_api_key }}` }}"
---
{{- /* ---- Spree->storefront webhook signing secret ---- */ -}}
{{- /* Single SPREE_WEBHOOK_SECRET → `<slug>-webhook`. Shared by the Spree      */ -}}
{{- /* backend (WebhookEndpoint#secret_key, set by the tkf webhook seed) and    */ -}}
{{- /* the storefront's HMAC verifier.                                          */ -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "webhook") }}
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: {{ .Values.externalSecrets.storeKind }}
  dataFrom:
  - extract:
      key: {{ $bundle }}
  target:
    name: {{ include "spree-store.resourceName" (dict "ctx" . "suffix" "webhook") }}
    creationPolicy: Owner
    template:
      data:
        SPREE_WEBHOOK_SECRET: "{{ `{{ .spree_webhook_secret }}` }}"
---
{{- end }}

{{- /* ---- service_user/<acct>/<slug>-spree-<env> (IAM keys; separate secret) ---- */ -}}
{{- if .Values.externalSecrets.asmKeys.spreeS3 }}
{{ include "spree-store.externalSecret" (dict
  "name" (include "spree-store.resourceName" (dict "ctx" . "suffix" "spree-s3"))
  "asmKey" .Values.externalSecrets.asmKeys.spreeS3
  "data" (list "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY")
  "context" $) }}
---
{{- end }}

{{- /* ---- service_user/<acct>/<slug>-payload-<env> (IAM keys; separate secret) ---- */ -}}
{{- if .Values.externalSecrets.asmKeys.cmsS3 }}
{{ include "spree-store.externalSecret" (dict
  "name" (include "spree-store.resourceName" (dict "ctx" . "suffix" "cms-s3"))
  "asmKey" .Values.externalSecrets.asmKeys.cmsS3
  "data" (list "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY")
  "context" $) }}
---
{{- end }}

{{- /* ---- service_user/<acct>/cnpg (IAM keys; separate secret) ---- */ -}}
{{- if and .Values.cnpg.objectStore.enabled .Values.externalSecrets.asmKeys.cnpgBackup }}
{{ include "spree-store.externalSecret" (dict
  "name" (include "spree-store.resourceName" (dict "ctx" . "suffix" "cnpg-backup"))
  "asmKey" .Values.externalSecrets.asmKeys.cnpgBackup
  "data" (list "AWS_ACCESS_KEY_ID" "AWS_SECRET_ACCESS_KEY")
  "context" $) }}
{{- end }}
