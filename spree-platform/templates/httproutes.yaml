{{- $ns := include "spree-store.namespace" . -}}
{{- $release := .Release.Name -}}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $release }}-admin
  namespace: {{ .Values.gateway.namespace }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
spec:
  # admin may live on the apex (own listener) while api lives on a subdomain
  # (wildcard listener), so each route binds only the listener its single
  # hostname intersects — listing both would leave one parentRef with
  # NoMatchingListenerHostname. Falls back to .fitness for single-listener setups.
  parentRefs:
    {{- range (.Values.gateway.sectionNames.admin | default .Values.gateway.sectionNames.fitness) }}
    - name: {{ $.Values.gateway.name }}
      sectionName: {{ . }}
    {{- end }}
  hostnames:
    - {{ .Values.hostnames.admin | quote }}
  rules:
    - backendRefs:
        - name: {{ $release }}-web
          namespace: {{ $ns }}
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $release }}-api
  namespace: {{ .Values.gateway.namespace }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- range (.Values.gateway.sectionNames.api | default .Values.gateway.sectionNames.fitness) }}
    - name: {{ $.Values.gateway.name }}
      sectionName: {{ . }}
    {{- end }}
  hostnames:
    - {{ .Values.hostnames.api | quote }}
  rules:
    - backendRefs:
        - name: {{ $release }}-web
          namespace: {{ $ns }}
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $release }}-storefront
  namespace: {{ .Values.gateway.namespace }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
spec:
  # Multi-domain storefront: one Service, many public domains, each pinned to a
  # Spree market by the storefront app. sectionNames.storefront lists every
  # base-domain listener the domains attach to (falls back to .com for a
  # single-domain store). The gateway binds each listener only to the
  # intersecting hostname.
  parentRefs:
    {{- range (.Values.gateway.sectionNames.storefront | default .Values.gateway.sectionNames.com) }}
    - name: {{ $.Values.gateway.name }}
      sectionName: {{ . }}
    {{- end }}
  hostnames:
    {{- if kindIs "slice" .Values.hostnames.storefront }}
    {{- range .Values.hostnames.storefront }}
    - {{ . | quote }}
    {{- end }}
    {{- else }}
    - {{ .Values.hostnames.storefront | quote }}
    {{- end }}
  rules:
    - backendRefs:
        - name: {{ $release }}-storefront
          namespace: {{ $ns }}
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $release }}-cms
  namespace: {{ .Values.gateway.namespace }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- range (.Values.gateway.sectionNames.cms | default .Values.gateway.sectionNames.com) }}
    - name: {{ $.Values.gateway.name }}
      sectionName: {{ . }}
    {{- end }}
  hostnames:
    - {{ .Values.hostnames.cms | quote }}
  # cms-staging is now an admin-only surface. Public content (Pages,
  # Posts) is rendered by the storefront app under /pages/* and /blog/*
  # via Payload's REST API (in-cluster DNS). Anything not in the prefix
  # list below gets a 404 from the gateway.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /admin
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /_next
      backendRefs:
        - name: {{ $release }}-cms
          namespace: {{ $ns }}
          port: 80
