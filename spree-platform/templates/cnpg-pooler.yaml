{{- if .Values.cnpg.pooler.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: {{ .Values.cnpg.name }}-pooler-rw
  namespace: {{ include "spree-store.namespace" . }}
  labels: {{- include "spree-store.labels" . | nindent 4 }}
spec:
  cluster:
    name: {{ .Values.cnpg.name }}
  instances: {{ .Values.cnpg.pooler.instances }}
  type: rw
  pgbouncer:
    poolMode: transaction
    parameters:
      max_client_conn: {{ .Values.cnpg.pooler.maxClientConn | quote }}
      default_pool_size: {{ .Values.cnpg.pooler.defaultPoolSize | quote }}
{{- end }}
